      const treeData = buildTreeData();

      // ──────────────────── COLORS (soft grays) ────────────────────
      const levelColors = {
        root: "#1f1f1f",
        domain: "#2b2b2b",
        paradigm: "#333333",
        language: "#3d3d3d",
        framework: "#474747",
        "algo-category": "#525252",
        algo: "#5c5c5c",
        "datastructure-category": "#4a4a4a",
        datastructure: "#5e5e5e",
        "tool-category": "#555555",
        tool: "#636363",
        "database-category": "#4a4a4a",
        database: "#5e5e5e",
        "network-category": "#4a4a4a",
        network: "#5e5e5e",
        os: "#555555",
        "security-category": "#4a4a4a",
        concept: "#5e5e5e",
        theory: "#5e5e5e",
        hardware: "#5e5e5e"
      };
      function getColor(d) { return levelColors[d.data.level] || "#4a4a4a"; }

      // ──────────────────── SVG & D3 SETUP ────────────────────
      const svg = d3.select("#chart");
      const gRoot = svg.append("g");
      const width = window.innerWidth, height = window.innerHeight;
      svg.attr("width", width).attr("height", height);

      const zoom = d3.zoom().scaleExtent([0.15, 3.0]).on("zoom", (e) => gRoot.attr("transform", e.transform));
      svg.call(zoom);
      svg.call(zoom.transform, d3.zoomIdentity.translate(140, height/2).scale(0.65));

      const treeLayout = d3.tree().nodeSize([46, 270]).separation((a,b) => (a.parent===b.parent?1.3:1.8));
      let root = d3.hierarchy(treeData);
      // initial collapse: show domains, hide deeper
      root.children.forEach(d => {
        if(d.children) d.children.forEach(c => {
          if(c.children) { c._children = c.children; c.children = null; }
        });
      });

      const searchInput = document.getElementById("search-input");
      const clearBtn = document.getElementById("clear-search");
      let searchTerm = "";
      const dataNodeMap = new Map();
      function mapAllNodes(node) {
        if(node.data) dataNodeMap.set(node.data, node);
        if(node.children) node.children.forEach(mapAllNodes);
        if(node._children) node._children.forEach(mapAllNodes);
      }

      function curvedPath(s,t) {
        const mx = (s.y+t.y)/2;
        return `M${s.y},${s.x} C${mx},${s.x} ${mx},${t.x} ${t.y},${t.x}`;
      }

      function update() {
        treeLayout(root);
        const desc = root.descendants(), links = root.links();
        // Links
        const link = gRoot.selectAll(".link").data(links, d=>d.target.data.name+"->"+d.source.data.name);
        link.exit().remove();
        link.enter().append("path").attr("class","link").attr("d",d=>curvedPath(d.source,d.target));
        link.attr("class", d=> "link"+(searchTerm&&d.target.data.name.toLowerCase().includes(searchTerm)?" highlight-link":"") )
          .transition().duration(400).attr("d",d=>curvedPath(d.source,d.target));
        // Nodes
        const node = gRoot.selectAll(".node-group").data(desc, d=>d.data.name+"@"+d.depth+(d.parent?d.parent.data.name:""));
        node.exit().remove();
        const nodeEnter = node.enter().append("g").attr("class","node-group").attr("transform",d=>`translate(${d.y},${d.x})`);
        nodeEnter.append("rect").attr("class","node-rect").attr("x",-100).attr("y",-16).attr("width",200).attr("height",32).attr("rx",16).attr("ry",16).attr("fill",d=>getColor(d));
        nodeEnter.append("text").attr("class","node-text").attr("text-anchor","middle").attr("dy",5).text(d=>d.data.name);
        nodeEnter.each(function(d){ if(d.data.url){ d3.select(this).append("text").attr("class","external-icon").attr("dy",5).attr("font-size","13px").attr("dx",60).text("↗").on("click",(ev)=>{ev.stopPropagation(); window.open(d.data.url,"_blank");}); } });
        nodeEnter.on("click",(ev,d)=>{
          ev.stopPropagation();
          if(!d.children&&!d._children){ if(d.data.url) window.open(d.data.url,"_blank"); return; }
          if(d.children){ d._children=d.children; d.children=null; }else if(d._children){ d.children=d._children; d._children=null; }
          update(); mapAllNodes(root);
        });
        const nodeMerge = node.merge(nodeEnter);
        nodeMerge.transition().duration(400).attr("transform",d=>`translate(${d.y},${d.x})`);
        nodeMerge.each(function(d){
          const g=d3.select(this), bbox=g.select(".node-text").node().getBBox();
          const rw=Math.max(100,bbox.width+44); g.select(".node-rect").attr("x",-rw/2).attr("width",rw);
          const ext=g.select(".external-icon"); if(!ext.empty()) ext.attr("dx",rw/2-12);
        });
        nodeMerge.select(".node-rect").attr("class",d=>"node-rect"+(searchTerm&&d.data.name.toLowerCase().includes(searchTerm)?" highlight":""));
        nodeMerge.each(function(d){ if(d.depth===0) d3.select(this).classed("root-node-group",true); else d3.select(this).classed("root-node-group",false); });
        let mx=0,my=0; desc.forEach(d=>{if(d.y+350>mx)mx=d.y+350; if(d.x+150>my)my=d.x+150;});
        svg.attr("viewBox",`0 0 ${Math.max(width,mx)} ${Math.max(height,my)}`);
      }

      function expandAncestors(dn) {
        let cur=dn; while(cur){ if(cur._children&&!cur.children){ cur.children=cur._children; cur._children=null; } cur=cur.parent; }
      }
      function performSearch(term) {
        searchTerm=term.toLowerCase().trim();
        if(searchTerm.length>=2){
          const matched=[]; dataNodeMap.forEach((dn,data)=>{ if(data.name.toLowerCase().includes(searchTerm)) matched.push(dn); });
          matched.forEach(expandAncestors); treeLayout(root);
        }
        update(); mapAllNodes(root); clearBtn.style.display=searchTerm.length>0?"block":"none";
      }
      searchInput.addEventListener("input",()=>performSearch(searchInput.value));
      clearBtn.addEventListener("click",()=>{ searchInput.value=""; performSearch(""); });
      document.addEventListener("keydown",(e)=>{ if(e.key==="Escape"){ searchInput.value=""; performSearch(""); searchInput.blur(); } });

      mapAllNodes(root); update();
      window.addEventListener("resize",()=>{ svg.attr("width",window.innerWidth).attr("height",window.innerHeight); update(); });
    })();
  </script>
